/* ===== BACKGROUND FIX (NO STRIPES) ===== */
body {
  margin: 0;
  color: white;
  text-align: center;
  font-family: Arial;
  position: relative;
  z-index: 1;
}

body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
    url("images/stars.jpg") center/cover no-repeat;

  z-index: -1;
}

/* ===== UI ===== */
.container {
  display:flex;
  justify-content:center;
  gap:40px;
  margin-top:40px;
}

.item { cursor:pointer; }
.item:hover { transform:scale(1.05); }

img.main {
  width:220px;
  height:300px;
  object-fit:cover;
  border-radius:12px;
}

button {
  margin:10px;
  padding:10px 20px;
  background:#333;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.bracket {
  display:flex;
  justify-content:center;
  gap:40px;
  margin-top:60px;
}

.round { display:flex; flex-direction:column; gap:12px; }

.match {
  background:#222;
  padding:8px;
  border-radius:8px;
  width:170px;
  box-shadow: 0 0 10px rgba(255,255,255,0.1);
}

.player { display:flex; align-items:center; gap:6px; }
.player img { width:36px; height:50px; }

.winner { border:2px solid gold; }

// ===== GAME STATE =====
let players, roundPlayers, nextRoundPlayers, pair;
let rounds, matches, roundNumber, skips;
let final3Players;

function shuffle(array){
  for(let i = array.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// ===== START GAME =====
function startGame(mode){

  players = characterSets[mode].map(p => ({
    name: p.split("/").pop().replace(".jpg","").replace(/_/g," "),
    img: p
  }));

  roundPlayers = shuffle([...players]);
  nextRoundPlayers = [];
  pair = [];

  rounds = [];
  matches = [];

  roundNumber = 1;
  skips = 3;

  document.getElementById("menu").style.display = "none";
  document.getElementById("skipBtn").style.display = "inline-block";

  startRound();
}

// ===== START ROUND =====
function startRound(){
  document.getElementById("roundInfo").innerText = "Kolo " + roundNumber;
  nextMatch();
}

// ===== FLOW =====
function nextMatch(){

  if(roundPlayers.length === 3){
    final3Players = [...roundPlayers];
    roundPlayers = [];
    renderFinal3();
    return;
  }

  if(roundPlayers.length === 0){

    rounds.push(matches);
    matches = [];

    if(nextRoundPlayers.length === 1){
      showWinner(nextRoundPlayers[0]);
      return;
    }

    roundPlayers = shuffle(nextRoundPlayers);
    nextRoundPlayers = [];
    roundNumber++;

    startRound();
    return;
  }

  pair = [roundPlayers.shift(), roundPlayers.shift()];
  renderPair();
}

// ===== RENDER =====
function renderPair(){
  const game = document.getElementById("game");
  game.innerHTML = "";

  pair.forEach((p,i)=>{
    let div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <img class="main" src="${p.img}">
      <p>${p.name}</p>
    `;

    div.onclick = ()=>choose(i);
    game.appendChild(div);
  });

  skipBtn.style.display = "inline-block";
}

function renderFinal3(){
  const game = document.getElementById("game");
  game.innerHTML = "";

  final3Players.forEach(p=>{
    let div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <img class="main" src="${p.img}">
      <p>${p.name}</p>
    `;

    div.onclick = ()=>chooseFinal3(p);
    game.appendChild(div);
  });

  skipBtn.style.display = "none";
}

// ===== CHOOSE =====
function choose(i){
  let winner = pair[i];

  matches.push({
    type:"normal",
    p1:pair[0],
    p2:pair[1],
    winner
  });

  nextRoundPlayers.push(winner);
  nextMatch();
}

function chooseFinal3(p){
  matches.push({
    type:"final3",
    players:final3Players,
    winner:p
  });

  nextRoundPlayers.push(p);
  nextMatch();
}

// ===== SKIP =====
function skip(){
  if(skips<=0) return;

  skips--;
  skipBtn.innerText = `Přeskočit (${skips})`;

  nextRoundPlayers.push(...pair);
  nextMatch();
}

// ===== RESULT =====
function showWinner(winner){

  let html = `
    <h1>👑 ${winner.name}</h1>
    <img src="${winner.img}" style="width:200px;border-radius:12px;">
  `;

  html += `<div class="bracket">`;

  rounds.forEach(r=>{
    html += `<div class="round">`;

    r.forEach(m=>{

      if(m.type==="final3"){
        html += `<div class="match">` +
        m.players.map(p=>`
          <div class="player ${m.winner===p?"winner":""}">
            <img src="${p.img}">${p.name}
          </div>`).join("") +
        `</div>`;
      }

      else{
        html += `
        <div class="match">
          <div class="player ${m.winner===m.p1?"winner":""}">
            <img src="${m.p1.img}">${m.p1.name}
          </div>
          <div class="player ${m.winner===m.p2?"winner":""}">
            <img src="${m.p2.img}">${m.p2.name}
          </div>
        </div>`;
      }

    });

    html += `</div>`;
  });

  html += `</div>`;

  html += `<br><button onclick="location.reload()">🔁 Hrát znovu</button>`;

  document.body.innerHTML = html;
}
